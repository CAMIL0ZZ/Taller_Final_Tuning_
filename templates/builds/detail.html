{% extends "base.html" %}

{% block content %}

<h2>Build Detail</h2>

<div class="card">
    <div class="card-body">

        <p><strong>ID:</strong> {{ build.id }}</p>
        <p><strong>Name:</strong> {{ build.name }}</p>
        <p><strong>Approach:</strong> {{ build.build_approach }}</p>
        <p><strong>Price:</strong> ${{ build.price }}</p>

    </div>
</div>

{% endblock %}
