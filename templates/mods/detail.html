{% extends "base.html" %}

{% block content %}

<h2>Mod Detail</h2>

<div class="card">

    <div class="card-body">

        <p><strong>ID:</strong> {{ mod.id }}</p>
        <p><strong>Name:</strong> {{ mod.name }}</p>
        <p><strong>Type:</strong> {{ mod.type_mod }}</p>
        <p><strong>Price:</strong> ${{ mod.price }}</p>

    </div>

</div>

{% endblock %}
