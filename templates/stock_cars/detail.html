{% extends "base.html" %}

{% block content %}

<h2>{{ car.brand }} {{ car.model }}</h2>

<div class="card">
    <div class="card-body">

        <p><strong>Brand:</strong> {{ car.brand }}</p>
        <p><strong>Model:</strong> {{ car.model }}</p>
        <p><strong>Year:</strong> {{ car.year }}</p>
        <p><strong>Fuel:</strong> {{ car.fuel }}</p>
        <p><strong>Chassis:</strong> {{ car.chassis_type }}</p>

    </div>
</div>

{% endblock %}
