{% extends "base.html" %}

{% block content %}

<h2>Builds</h2>

<table class="table table-bordered table-hover">

    <thead class="table-dark">

        <tr>
            <th>Image</th>
            <th>Name</th>
            <th>Approach</th>
            <th>HP</th>
            <th>Price</th>
            <th>Details</th>
        </tr>

    </thead>

    <tbody>

    {% for build in builds %}

        <tr>

            <td>

                {% if build.picture %}
                    <img
                        src="{{ build.picture }}"
                        width="180"
                        height="120">
                {% else %}
                    No Image
                {% endif %}

            </td>

            <td>{{ build.build_name }}</td>

            <td>{{ build.build_approach }}</td>

            <td>{{ build.hp }}</td>

            <td>${{ build.price }}</td>

            <td>

                <a
                    href="/builds/{{ build.id }}"
                    class="btn btn-primary btn-sm">

                    Detail

                </a>

            </td>

        </tr>

    {% endfor %}

    </tbody>

</table>

{% endblock %}
